name: DevSecOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: .semgrep.yml

      - name: Dependency Scan
        uses: pyupio/safety-action@v1

      - name: Secret Scan
        uses: trufflesecurity/trufflehog@v3

      - name: Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          path: .
          format: table
          output: trivy-report.txt

      - name: Upload Scan Results
        uses: actions/upload-artifact@v4
        with:
          name: security-scans
          path: trivy-report.txt

  build:
    runs-on: ubuntu-latest
    needs: scan
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t secure-app:${{ github.sha }} .

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: secure-app:${{ github.sha }}
          output-file: sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

      - name: Trusted Build Marker
        run: echo "Image secure-app:${{ github.sha }} is trusted" > trusted-build.txt

      - name: Upload Trusted Build Marker
        uses: actions/upload-artifact@v4
        with:
          name: trusted-build
          path: trusted-build.txt
